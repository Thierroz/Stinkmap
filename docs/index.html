<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stinkmap" />
  <meta name="description" content="The world's stink heatmap — rate smelly places and see what others say." />
  <title>Stinkmap</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0d1a;
      --surface:   #13132a;
      --surface2:  #1c1c3a;
      --border:    rgba(181,245,66,.15);
      --accent:    #b5f542;
      --text:      #e8ffe0;
      --muted:     #7a8a6a;
      --danger:    #ff4d4d;
      --radius:    18px;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
      --tab-h:     68px;
      --header-h:  62px;
    }

    html, body { height: 100dvh; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }

    /* ── Persistent map layer ─────────────────────────────── */
    #leaflet-map {
      position: fixed;
      top: calc(var(--safe-top) + var(--header-h));
      left: 0; right: 0;
      bottom: var(--tab-h);
      z-index: 0;
    }

    /* ── Header ───────────────────────────────────────────── */
    #header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      height: calc(var(--safe-top) + var(--header-h));
      padding: calc(var(--safe-top) + 12px) 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(13,13,26,.92); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .logo-row { display: flex; align-items: center; gap: 10px; }
    .logo-img {
      width: 32px; height: 32px;
      filter: drop-shadow(0 0 8px rgba(181,245,66,.6));
      animation: float 3.5s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    #app-title {
      font-size: 1.2rem; font-weight: 700;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    #rating-count {
      font-size: .75rem; color: var(--muted);
      background: rgba(181,245,66,.1); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
    }
    #rating-count span { color: var(--accent); font-weight: 600; }

    /* ── Tab bar ──────────────────────────────────────────── */
    #tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
      height: var(--tab-h); padding-bottom: var(--safe-bot);
      background: rgba(13,13,26,.95); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      border: none; background: none; cursor: pointer;
      color: var(--muted); font-family: inherit;
      font-size: .68rem; font-weight: 500; letter-spacing: .04em;
      transition: color .2s; -webkit-tap-highlight-color: transparent;
    }
    .tab .ti { font-size: 1.45rem; transition: transform .2s; }
    .tab.active { color: var(--accent); }
    .tab.active .ti { transform: scale(1.15); }

    /* ── Mode hint (shown on map) ─────────────────────────── */
    #mode-hint {
      position: fixed; bottom: calc(var(--tab-h) + 14px); left: 50%;
      transform: translateX(-50%);
      background: rgba(13,13,26,.88); backdrop-filter: blur(8px);
      border: 1px solid var(--border); border-radius: 30px;
      padding: 8px 18px; font-size: .78rem; color: var(--muted);
      z-index: 100; pointer-events: none;
      transition: opacity .3s;
    }
    #mode-hint.hidden { opacity: 0; }

    /* ── Comment popup (Stink Map tap) ───────────────────── */
    .leaflet-popup-content-wrapper {
      background: #1c1c3a !important; border: 1px solid rgba(181,245,66,.2) !important;
      color: #e8ffe0 !important; border-radius: 16px !important;
      font-family: 'Inter', sans-serif !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.7) !important;
    }
    .leaflet-popup-tip { background: #1c1c3a !important; }
    .leaflet-popup-content { margin: 14px 16px !important; min-width: 200px; }
    .pop-avg {
      text-align: center; margin-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,.07); padding-bottom: 10px;
    }
    .pop-avg-score { font-size: 2.4rem; font-weight: 800; line-height: 1; }
    .pop-avg-label { font-size: .75rem; color: var(--muted); margin-top: 3px; }
    .pop-count { font-size: .7rem; color: var(--muted); margin-bottom: 10px; }
    .pop-entry { padding: 7px 0; border-bottom: 1px solid rgba(255,255,255,.05); display: flex; gap: 10px; align-items: flex-start; }
    .pop-entry:last-child { border-bottom: none; }
    .pop-score { font-size: 1rem; font-weight: 700; flex-shrink: 0; min-width: 22px; }
    .pop-text { font-size: .8rem; color: var(--muted); }
    .pop-comment { color: var(--text); font-style: italic; }
    .pop-empty { font-size: .82rem; color: var(--muted); text-align: center; padding: 8px 0; }

    /* User loc dot */
    .user-loc-dot {
      width: 16px; height: 16px; border-radius: 50%;
      background: #4285f4; border: 2.5px solid #fff;
      box-shadow: 0 0 0 4px rgba(66,133,244,.3), 0 2px 6px rgba(0,0,0,.5);
    }

    /* ── Rate bottom sheet ────────────────────────────────── */
    #rate-sheet {
      position: fixed; bottom: var(--tab-h); left: 0; right: 0; z-index: 150;
      background: var(--surface2);
      border-top: 1px solid rgba(181,245,66,.25);
      border-radius: 20px 20px 0 0;
      padding: 16px 20px calc(var(--safe-bot) + 16px);
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,1,.6,1);
      box-shadow: 0 -8px 40px rgba(0,0,0,.6);
    }
    #rate-sheet.open { transform: translateY(0); }

    .sheet-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: rgba(255,255,255,.2); margin: 0 auto 14px;
    }
    .sheet-loc {
      font-size: .78rem; color: var(--muted);
      margin-bottom: 14px; display: flex; align-items: center; gap: 6px;
    }
    .sheet-loc-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 6px var(--accent); flex-shrink: 0;
    }
    .sheet-loc-dot.map-pin { background: #4285f4; box-shadow: 0 0 6px #4285f4; }

    /* Slider in sheet */
    .scale-row { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .scale-big { font-size: 2.8rem; font-weight: 800; min-width: 52px; text-align: center; line-height: 1; }
    .scale-info { flex: 1; }
    .scale-name { font-size: .92rem; font-weight: 600; }
    #sheet-slider {
      width: 100%; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      height: 8px; border-radius: 4px;
      background: linear-gradient(to right,
        #00ff88 0%, #44ff66 11%, #88ee44 22%, #ccee22 33%, #eeff00 44%,
        #ffcc00 55%, #ff8800 66%, #ff4400 77%, #ff1100 88%, #cc0000 100%);
      outline: none; margin-bottom: 4px;
    }
    #sheet-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 28px; height: 28px; border-radius: 50%;
      background: #fff; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.5), 0 0 0 3px var(--accent);
      transition: transform .1s;
    }
    #sheet-slider:active::-webkit-slider-thumb { transform: scale(1.2); }
    .scale-ends { display: flex; justify-content: space-between; font-size: .67rem; color: var(--muted); margin-bottom: 12px; }

    #sheet-comment {
      width: 100%; padding: 11px 14px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: .9rem; font-family: inherit;
      outline: none; resize: none; transition: border-color .2s;
      -webkit-appearance: none; appearance: none;
      margin-bottom: 12px;
    }
    #sheet-comment::placeholder { color: var(--muted); }
    #sheet-comment:focus { border-color: var(--accent); }

    .sheet-btns { display: flex; gap: 10px; }
    #sheet-cancel {
      padding: 14px 20px; border-radius: 12px;
      background: none; border: 1px solid rgba(255,255,255,.12);
      color: var(--muted); font-family: inherit; font-size: .9rem;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    #sheet-submit {
      flex: 1; padding: 14px;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      border: none; border-radius: 12px;
      color: #0d0d1a; font-size: 1rem; font-weight: 700;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
      -webkit-tap-highlight-color: transparent;
      transition: opacity .2s;
    }
    #sheet-submit:disabled { opacity: .45; cursor: not-allowed; }

    /* ── My Ratings overlay ───────────────────────────────── */
    #mine-panel {
      position: fixed;
      top: calc(var(--safe-top) + var(--header-h));
      left: 0; right: 0;
      bottom: var(--tab-h);
      z-index: 150;
      background: var(--bg);
      overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding: 20px 20px calc(var(--safe-bot) + 20px);
      transform: translateY(100%);
      transition: transform .35s cubic-bezier(.32,1,.6,1);
    }
    #mine-panel.open { transform: translateY(0); }

    .mine-header { margin-bottom: 18px; }
    .mine-title { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .mine-sub { font-size: .78rem; color: var(--muted); margin-top: 4px; }

    .empty-msg { text-align: center; color: var(--muted); padding: 48px 0; font-size: .9rem; }

    .rating-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,.05);
      max-width: 480px; margin: 0 auto;
    }
    .rating-item:last-child { border-bottom: none; }
    .ri-score { font-size: 1.5rem; font-weight: 800; flex-shrink: 0; min-width: 36px; text-align: center; line-height: 1.2; }
    .ri-info { flex: 1; }
    .ri-title { font-size: .88rem; font-weight: 600; }
    .ri-meta  { font-size: .72rem; color: var(--muted); margin-top: 2px; }
    .ri-comment { font-size: .8rem; color: var(--muted); margin-top: 4px; font-style: italic; }
    .ri-loc-btn {
      background: rgba(181,245,66,.1); border: 1px solid var(--border);
      color: var(--accent); border-radius: 8px;
      padding: 5px 10px; font-size: .7rem; cursor: pointer;
      -webkit-tap-highlight-color: transparent; flex-shrink: 0; align-self: center;
      transition: background .2s;
    }
    .ri-loc-btn:active { background: rgba(181,245,66,.2); }
    .ri-delete {
      background: none; border: 1px solid rgba(255,77,77,.3);
      color: var(--danger); border-radius: 8px;
      padding: 5px 10px; font-size: .7rem; cursor: pointer;
      transition: background .2s; flex-shrink: 0; align-self: center;
      -webkit-tap-highlight-color: transparent;
    }
    .ri-delete:active { background: rgba(255,77,77,.15); }

    /* Spinner */
    .spinner {
      width: 18px; height: 18px;
      border: 3px solid rgba(13,13,26,.4); border-top-color: #0d0d1a;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed; bottom: calc(var(--safe-bot) + var(--tab-h) + 14px); left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 40px; padding: 11px 22px;
      font-size: .86rem; font-weight: 500;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0,0,0,.4); z-index: 9999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <!-- Header (always visible) -->
  <div id="header">
    <div class="logo-row">
      <img class="logo-img" src="icon-512.png" alt="" />
      <span id="app-title">Stinkmap</span>
    </div>
    <div id="rating-count"><span id="rating-num">0</span> ratings</div>
  </div>

  <!-- Map (always rendered) -->
  <div id="leaflet-map"></div>

  <!-- Mode hint -->
  <div id="mode-hint">Tap the map to see stink details</div>

  <!-- Rate bottom sheet -->
  <div id="rate-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-loc">
      <div class="sheet-loc-dot" id="sheet-loc-dot"></div>
      <span id="sheet-loc-text">…</span>
    </div>
    <div class="scale-row">
      <div class="scale-big" id="sheet-score">3</div>
      <div class="scale-info">
        <div class="scale-name" id="sheet-label">A slight hint</div>
        <input type="range" id="sheet-slider" min="1" max="10" value="3" step="1" />
        <div class="scale-ends"><span>🌸 Fresh</span><span>💀 Deadly</span></div>
      </div>
    </div>
    <textarea id="sheet-comment" rows="2" maxlength="100" placeholder="What does it smell like? (optional)"></textarea>
    <div class="sheet-btns">
      <button id="sheet-cancel">Cancel</button>
      <button id="sheet-submit">
        <span id="sheet-submit-icon">💨</span>
        <span id="sheet-submit-label">Submit</span>
      </button>
    </div>
  </div>

  <!-- My Ratings overlay -->
  <div id="mine-panel">
    <div class="mine-header">
      <div class="mine-title">💨 My Ratings</div>
      <div class="mine-sub">Tap 📍 to fly to a rating on the map</div>
    </div>
    <div id="mine-list"><p class="empty-msg">You haven't rated anything yet.</p></div>
  </div>

  <!-- Tab bar -->
  <nav id="tabbar">
    <button class="tab active" data-mode="stink">
      <span class="ti">🗺️</span><span>Stink Map</span>
    </button>
    <button class="tab" data-mode="rate">
      <span class="ti">💨</span><span>Rate</span>
    </button>
    <button class="tab" data-mode="mine">
      <span class="ti">👤</span><span>My Ratings</span>
    </button>
  </nav>

  <div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<script type="module">
import { initializeApp }     from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth, signInAnonymously,
         onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
import { getFirestore, collection, addDoc,
         deleteDoc, doc,
         onSnapshot, query,
         orderBy, limit }     from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

// ── Firebase ──────────────────────────────────────────────────
const fbApp = initializeApp({
  apiKey:            "AIzaSyC_40kkX7noNP4sCiphkla-n2yoaykTDfE",
  authDomain:        "stinkmap.firebaseapp.com",
  projectId:         "stinkmap",
  storageBucket:     "stinkmap.firebasestorage.app",
  messagingSenderId: "216908791201",
  appId:             "1:216908791201:web:23fb8d8e70a584e4c79fe0"
});
const auth       = getAuth(fbApp);
const db         = getFirestore(fbApp);
const ratingsCol = collection(db, 'ratings');

// ── Scale ─────────────────────────────────────────────────────
const LABELS = [
  '', 'Perfectly fresh', 'Barely anything', 'A slight hint',
  'Slightly off', 'Noticeable', 'Getting bad', 'Pretty bad',
  'Really stinks!', 'Awful', 'Absolutely deadly'
];
const COLORS = [
  '', '#00ff88','#44ff66','#88ee44','#ccee22','#eeff00',
  '#ffcc00','#ff8800','#ff4400','#ff1100','#cc0000'
];

// ── State ─────────────────────────────────────────────────────
let currentUser = null;
let allRatings  = [];
let mode        = 'stink';          // 'stink' | 'rate' | 'mine'
let pendingPos  = null;             // position chosen for a rating
let sheetVal    = 3;

// ── Helpers ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const showToast = (msg, ms = 2800) => {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
};
const formatDate = ts => new Date(ts).toLocaleString('default', {
  day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
});
function haversine(la1, lo1, la2, lo2) {
  const R = 6371, r = Math.PI / 180;
  const a = Math.sin((la2-la1)*r/2)**2 + Math.cos(la1*r)*Math.cos(la2*r)*Math.sin((lo2-lo1)*r/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
function getUid() {
  if (currentUser) return currentUser.uid;
  let id = localStorage.getItem('stinkmap_uid');
  if (!id) { id = crypto.randomUUID(); localStorage.setItem('stinkmap_uid', id); }
  return id;
}

// ── Map ───────────────────────────────────────────────────────
let map, heat, userMarker, userAcc;

function initMap() {
  map = L.map('leaflet-map', { center: [20, 0], zoom: 2, zoomControl: false });
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 20
  }).addTo(map);

  heat = L.heatLayer([], {
    radius: 40, blur: 30, maxZoom: 17, max: 10,
    gradient: {
      0.10:'#00ff88', 0.20:'#44ff66', 0.30:'#88ee44', 0.40:'#ccee22', 0.50:'#eeff00',
      0.60:'#ffcc00', 0.70:'#ff8800', 0.80:'#ff4400', 0.90:'#ff1100', 1.00:'#cc0000'
    }
  }).addTo(map);

  map.on('click', onMapClick);
}

function buildHeatPoints(ratings) {
  const CLUSTER = 0.03, used = new Set(), pts = [];
  for (let i = 0; i < ratings.length; i++) {
    if (used.has(i)) continue;
    const g = [ratings[i]]; used.add(i);
    for (let j = i+1; j < ratings.length; j++) {
      if (!used.has(j) && haversine(ratings[i].lat, ratings[i].lon, ratings[j].lat, ratings[j].lon) < CLUSTER) {
        g.push(ratings[j]); used.add(j);
      }
    }
    const lat = g.reduce((s,r)=>s+r.lat,0)/g.length;
    const lon = g.reduce((s,r)=>s+r.lon,0)/g.length;
    const avg = g.reduce((s,r)=>s+r.stink,0)/g.length;
    g.forEach(() => pts.push([lat, lon, avg]));
  }
  return pts;
}

function renderMap(ratings) {
  $('rating-num').textContent = ratings.length;
  heat.setLatLngs(buildHeatPoints(ratings));
}

function updateUserDot(lat, lon, acc) {
  const ll = [lat, lon];
  if (!userMarker) {
    userMarker = L.marker(ll, {
      icon: L.divIcon({ className: 'user-loc-dot', iconSize: [16,16], iconAnchor: [8,8] }),
      zIndexOffset: 1000, interactive: false
    }).addTo(map);
    userAcc = L.circle(ll, {
      radius: acc, color:'#4285f4', fillColor:'#4285f4',
      fillOpacity:.08, weight:1, opacity:.35, interactive: false
    }).addTo(map);
  } else {
    userMarker.setLatLng(ll);
    userAcc.setLatLng(ll).setRadius(acc);
  }
}

// ── Map click dispatcher ──────────────────────────────────────
function onMapClick(e) {
  if (mode === 'stink') showStinkPopup(e.latlng);
  if (mode === 'rate')  openRateSheet(e.latlng);
}

// ── Stink Map: show popup with nearby ratings ─────────────────
function showStinkPopup(latlng) {
  const RADIUS_KM = 0.15;
  const nearby = allRatings.filter(r =>
    haversine(latlng.lat, latlng.lng, r.lat, r.lon) < RADIUS_KM
  );

  if (!nearby.length) {
    L.popup({ closeButton: false, maxWidth: 220 })
      .setLatLng(latlng)
      .setContent(`<div class="pop-empty">😶 No ratings here yet.<br>Switch to <b>Rate</b> mode to add one!</div>`)
      .openOn(map);
    return;
  }

  const avg   = nearby.reduce((s,r) => s+r.stink, 0) / nearby.length;
  const color = COLORS[Math.round(avg)];
  const label = LABELS[Math.round(avg)];

  const entries = nearby
    .sort((a,b) => b.ts - a.ts)
    .slice(0, 8)
    .map(r => {
      const comment = r.comment
        ? `<span class="pop-comment">"${r.comment}"</span>`
        : `<span style="color:var(--muted);font-style:italic">no comment</span>`;
      return `<div class="pop-entry">
        <div class="pop-score" style="color:${COLORS[r.stink]}">${r.stink}</div>
        <div class="pop-text">${comment}<br><span style="font-size:.68rem">${formatDate(r.ts)}</span></div>
      </div>`;
    }).join('');

  L.popup({ closeButton: true, maxWidth: 260 })
    .setLatLng(latlng)
    .setContent(`
      <div class="pop-avg">
        <div class="pop-avg-score" style="color:${color}">${avg.toFixed(1)}</div>
        <div class="pop-avg-label">${label}</div>
      </div>
      <div class="pop-count">📍 ${nearby.length} rating${nearby.length>1?'s':''} within 150 m</div>
      ${entries}
    `)
    .openOn(map);
}

// ── Rate mode: bottom sheet ───────────────────────────────────
function openRateSheet(latlng) {
  pendingPos = { lat: latlng.lat, lon: latlng.lng };
  map.closePopup();

  const isGps = pendingPos === null; // always false here, but keep for clarity
  $('sheet-loc-dot').className = 'sheet-loc-dot' + (pendingPos ? ' map-pin' : '');
  $('sheet-loc-text').textContent = `${pendingPos.lat.toFixed(5)}, ${pendingPos.lon.toFixed(5)}`;

  updateSheetSlider(sheetVal);
  $('sheet-comment').value = '';
  $('rate-sheet').classList.add('open');
}

function closeRateSheet() {
  $('rate-sheet').classList.remove('open');
  pendingPos = null;
}

function updateSheetSlider(val) {
  sheetVal = val;
  $('sheet-score').textContent = val;
  $('sheet-score').style.color = COLORS[val];
  $('sheet-label').textContent = LABELS[val];
  $('sheet-label').style.color = COLORS[val];
}

async function submitRating() {
  if (!pendingPos) return;

  const btn   = $('sheet-submit');
  const icon  = $('sheet-submit-icon');
  const label = $('sheet-submit-label');
  btn.disabled = true;
  icon.innerHTML = '<div class="spinner"></div>';
  label.textContent = 'Saving…';

  try {
    await addDoc(ratingsCol, {
      lat:     pendingPos.lat,
      lon:     pendingPos.lon,
      stink:   sheetVal,
      comment: $('sheet-comment').value.trim(),
      ts:      Date.now(),
      uid:     getUid()
    });
    showToast(`${sheetVal}/10 — Rating saved! 🌍`);
    closeRateSheet();
    map.setView([pendingPos.lat, pendingPos.lon], 15, { animate: true });
  } catch (err) {
    console.error(err);
    showToast('⚠️ Could not save — check connection');
  } finally {
    icon.textContent = '💨';
    label.textContent = 'Submit';
    btn.disabled = false;
  }
}

// ── My Ratings panel ─────────────────────────────────────────
function renderMine() {
  const uid  = getUid();
  const mine = allRatings.filter(r => r.uid === uid).slice(0, 30);
  const list = $('mine-list');
  if (!mine.length) {
    list.innerHTML = '<p class="empty-msg">You haven\'t rated anything yet.<br>Switch to Rate mode and tap the map!</p>';
    return;
  }
  list.innerHTML = mine.map(r => `
    <div class="rating-item">
      <div class="ri-score" style="color:${COLORS[r.stink]}">${r.stink}</div>
      <div class="ri-info">
        <div class="ri-title">${LABELS[r.stink]}</div>
        <div class="ri-meta">📍 ${r.lat.toFixed(4)}, ${r.lon.toFixed(4)} · ${formatDate(r.ts)}</div>
        ${r.comment ? `<div class="ri-comment">"${r.comment}"</div>` : ''}
      </div>
      <button class="ri-loc-btn" data-lat="${r.lat}" data-lon="${r.lon}">📍</button>
      <button class="ri-delete" data-id="${r.id}">🗑️</button>
    </div>`).join('');

  list.querySelectorAll('.ri-delete').forEach(btn =>
    btn.addEventListener('click', () => deleteRating(btn.dataset.id)));

  list.querySelectorAll('.ri-loc-btn').forEach(btn =>
    btn.addEventListener('click', () => {
      setMode('stink');
      map.setView([+btn.dataset.lat, +btn.dataset.lon], 15, { animate: true });
    }));
}

async function deleteRating(id) {
  try {
    await deleteDoc(doc(db, 'ratings', id));
    showToast('🗑️ Deleted');
  } catch (err) {
    console.error(err);
    showToast('⚠️ Could not delete');
  }
}

// ── Mode switching ────────────────────────────────────────────
function setMode(m) {
  mode = m;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === m));

  // panels
  $('mine-panel').classList.toggle('open', m === 'mine');
  if (m !== 'rate') closeRateSheet();

  // hint
  const hint = $('mode-hint');
  if (m === 'stink') {
    hint.textContent = '🗺️ Tap the map to see stink details';
    hint.classList.remove('hidden');
  } else if (m === 'rate') {
    hint.textContent = '💨 Tap anywhere on the map to rate it';
    hint.classList.remove('hidden');
  } else {
    hint.classList.add('hidden');
  }

  if (m === 'mine') renderMine();
  setTimeout(() => map.invalidateSize(), 80);
}

// ── Firestore listener ────────────────────────────────────────
function subscribe() {
  const q = query(ratingsCol, orderBy('ts','desc'), limit(2000));
  onSnapshot(q, snap => {
    allRatings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMap(allRatings);
    if (mode === 'mine') renderMine();
  }, err => {
    console.error(err);
    showToast('⚠️ Could not load ratings', 4000);
  });
}

// ── Events ────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t =>
  t.addEventListener('click', () => setMode(t.dataset.mode)));

$('sheet-slider').addEventListener('input', e => updateSheetSlider(+e.target.value));
$('sheet-cancel').addEventListener('click', closeRateSheet);
$('sheet-submit').addEventListener('click', submitRating);

// ── Init ──────────────────────────────────────────────────────
initMap();
subscribe();
setMode('stink');

onAuthStateChanged(auth, u => { currentUser = u; });
signInAnonymously(auth).catch(console.error);

if (navigator.geolocation) {
  navigator.geolocation.watchPosition(p => {
    const lat=p.coords.latitude, lon=p.coords.longitude, acc=Math.round(p.coords.accuracy);
    updateUserDot(lat, lon, acc);
    if (!userMarker && map) map.setView([lat, lon], 12, { animate: true });
  }, null, { enableHighAccuracy: true, maximumAge: 10000 });
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(console.warn);
</script>
</body>
</html>
