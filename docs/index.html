<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stinkmap" />
  <meta name="description" content="Rate how stinky a place is and see the world's stink heatmap." />
  <title>Stinkmap</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d1a;
      --surface:    #13132a;
      --surface2:   #1c1c3a;
      --border:     rgba(181,245,66,.15);
      --accent:     #b5f542;
      --accent-dim: rgba(181,245,66,.18);
      --text:       #e8ffe0;
      --text-muted: #7a8a6a;
      --danger:     #ff4d4d;
      --radius:     18px;
      --safe-top:   env(safe-area-inset-top, 0px);
      --safe-bot:   env(safe-area-inset-bottom, 0px);
      --tab-h:      68px;
    }

    html, body {
      height: 100%; height: 100dvh;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% -5%,  rgba(181,245,66,.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 105%, rgba(80,200,60,.08) 0%, transparent 60%),
        var(--bg);
      pointer-events: none;
    }

    #app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100dvh;
    }

    .view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
    .view.active { display: flex; }

    /* ── Tab bar ── */
    #tabbar {
      height: var(--tab-h); padding-bottom: var(--safe-bot);
      background: rgba(13,13,26,.95); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex; flex-shrink: 0; z-index: 100;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      cursor: pointer; border: none; background: none;
      color: var(--text-muted); font-family: inherit;
      font-size: .72rem; font-weight: 500; letter-spacing: .04em;
      transition: color .2s; -webkit-tap-highlight-color: transparent;
    }
    .tab .tab-icon { font-size: 1.55rem; transition: transform .2s; }
    .tab.active { color: var(--accent); }
    .tab.active .tab-icon { transform: scale(1.15); }

    /* ── Map view ── */
    #map-view { position: relative; }
    #map-header {
      padding: calc(var(--safe-top) + 14px) 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(13,13,26,.88); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .map-title { display: flex; align-items: center; gap: 10px; }
    .logo-img {
      width: 36px; height: 36px;
      filter: drop-shadow(0 0 10px rgba(181,245,66,.6));
      animation: float 3.5s ease-in-out infinite;
    }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
    h1 {
      font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .rating-count {
      font-size: .75rem; color: var(--text-muted);
      background: var(--accent-dim); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
    }
    .rating-count span { color: var(--accent); font-weight: 600; }

    #leaflet-map { flex: 1; z-index: 1; }

    .leaflet-popup-content-wrapper {
      background: var(--surface2) !important; border: 1px solid var(--border) !important;
      color: var(--text) !important; border-radius: 14px !important;
      font-family: 'Inter', sans-serif !important;
    }
    .leaflet-popup-tip { background: var(--surface2) !important; }
    .popup-stink { font-size: 1.2rem; font-weight: 700; color: var(--accent); }
    .popup-meta  { font-size: .78rem; color: var(--text-muted); margin-top: 4px; }
    .popup-comment { font-size: .85rem; margin-top: 6px; font-style: italic; }

    #fab {
      position: absolute; bottom: 24px; right: 20px;
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      border: none; font-size: 1.6rem;
      box-shadow: 0 4px 20px rgba(181,245,66,.45);
      cursor: pointer; z-index: 500;
      transition: transform .15s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; justify-content: center;
    }
    #fab:active { transform: scale(.92); box-shadow: 0 2px 10px rgba(181,245,66,.25); }

    /* ── Rate view ── */
    #rate-view { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .rate-inner {
      max-width: 480px; margin: 0 auto;
      padding: calc(var(--safe-top) + 24px) 20px calc(var(--safe-bot) + 100px);
      display: flex; flex-direction: column; gap: 16px;
    }
    .rate-header { text-align: center; margin-bottom: 8px; }
    .rate-header .big-emoji { font-size: 3.5rem; display: block; animation: float 3s ease-in-out infinite; }
    h2 {
      font-size: 1.5rem; font-weight: 700; margin-top: 10px;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .rate-sub { font-size: .82rem; color: var(--text-muted); margin-top: 4px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px; backdrop-filter: blur(8px);
    }
    .card-label {
      font-size: .72rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px;
    }

    .loc-row { display: flex; align-items: center; gap: 12px; }
    .loc-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent); box-shadow: 0 0 10px var(--accent);
      flex-shrink: 0; animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px var(--accent); }
      50%      { box-shadow: 0 0 18px rgba(181,245,66,.8); }
    }
    .loc-dot.waiting { background: var(--text-muted); box-shadow: none; animation: none; }
    .loc-dot.error   { background: var(--danger); box-shadow: 0 0 10px var(--danger); animation: none; }
    #loc-text { font-size: .88rem; color: var(--text-muted); }
    #loc-text.ready { color: var(--text); }

    /* Slider */
    .scale-display { text-align: center; margin-bottom: 16px; }
    #stink-value { font-size: 3.8rem; font-weight: 800; line-height: 1; color: var(--accent); }
    #stink-label { font-size: 1rem; font-weight: 600; margin-top: 6px; color: var(--accent); }

    #stink-slider {
      width: 100%; margin: 0; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      height: 8px; border-radius: 4px;
      background: linear-gradient(to right, #00ff88, #b5f542, #ffcc00, #ff7a40, #ff0000);
      outline: none;
    }
    #stink-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 30px; height: 30px; border-radius: 50%;
      background: #fff; cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.5), 0 0 0 3px var(--accent);
      transition: transform .1s;
    }
    #stink-slider:active::-webkit-slider-thumb { transform: scale(1.2); }
    .scale-labels {
      display: flex; justify-content: space-between;
      margin-top: 8px; font-size: .7rem; color: var(--text-muted);
    }

    /* Comment */
    #comment {
      width: 100%; padding: 13px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: .95rem; font-family: inherit;
      outline: none; resize: none; transition: border-color .2s;
      -webkit-appearance: none; appearance: none;
    }
    #comment::placeholder { color: var(--text-muted); }
    #comment:focus { border-color: var(--accent); }
    .char-count { text-align: right; font-size: .7rem; color: var(--text-muted); margin-top: 6px; }
    .char-count.warn { color: #f0c040; }

    /* Submit button */
    #submit-btn {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      border: none; border-radius: var(--radius);
      color: #0d0d1a; font-size: 1.1rem; font-weight: 700;
      letter-spacing: .02em; cursor: pointer;
      box-shadow: 0 4px 22px rgba(181,245,66,.35);
      transition: opacity .2s, transform .15s, box-shadow .2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    #submit-btn:disabled { opacity: .4; cursor: not-allowed; box-shadow: none; }
    #submit-btn:not(:disabled):active { transform: scale(.97); box-shadow: 0 2px 10px rgba(181,245,66,.2); }

    /* Spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(13,13,26,.4); border-top-color: #0d0d1a;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* My ratings list */
    .empty-msg { text-align: center; color: var(--text-muted); padding: 20px 0; font-size: .9rem; }
    .rating-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .rating-item:last-child { border-bottom: none; }
    .ri-score {
      font-size: 1.5rem; font-weight: 800; flex-shrink: 0;
      min-width: 36px; text-align: center; line-height: 1.2;
    }
    .ri-info { flex: 1; }
    .ri-title { font-size: .88rem; font-weight: 600; }
    .ri-meta  { font-size: .72rem; color: var(--text-muted); margin-top: 2px; }
    .ri-comment { font-size: .8rem; color: var(--text-muted); margin-top: 4px; font-style: italic; }
    .ri-delete {
      background: none; border: 1px solid rgba(255,77,77,.3);
      color: var(--danger); border-radius: 8px;
      padding: 5px 10px; font-size: .72rem; cursor: pointer;
      transition: background .2s; flex-shrink: 0; align-self: center;
      -webkit-tap-highlight-color: transparent;
    }
    .ri-delete:active { background: rgba(255,77,77,.15); }

    /* Toast */
    #toast {
      position: fixed; bottom: calc(var(--safe-bot) + var(--tab-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 40px; padding: 12px 24px;
      font-size: .88rem; font-weight: 500;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0,0,0,.4); z-index: 9999;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>
<div id="app">

  <!-- MAP VIEW -->
  <div class="view active" id="map-view">
    <div id="map-header">
      <div class="map-title">
        <img class="logo-img" src="icon-512.png" alt="Stinkmap logo" />
        <h1>Stinkmap</h1>
      </div>
      <div class="rating-count" id="rating-count"><span id="rating-num">0</span> ratings</div>
    </div>
    <div id="leaflet-map"></div>
    <button id="fab" title="Rate this spot">💨</button>
  </div>

  <!-- RATE VIEW -->
  <div class="view" id="rate-view">
    <div class="rate-inner">

      <div class="rate-header">
        <span class="big-emoji">💨</span>
        <h2>Rate this spot</h2>
        <p class="rate-sub">How bad does it smell right here?</p>
      </div>

      <!-- Location -->
      <div class="card">
        <div class="card-label">📍 Your location</div>
        <div class="loc-row">
          <div class="loc-dot waiting" id="loc-dot"></div>
          <span id="loc-text">Waiting for GPS…</span>
        </div>
      </div>

      <!-- Stink scale 1-10 -->
      <div class="card">
        <div class="card-label">👃 Stink intensity (1–10)</div>
        <div class="scale-display">
          <span id="stink-value">3</span>
          <div id="stink-label">A slight hint</div>
        </div>
        <input type="range" id="stink-slider" min="1" max="10" value="3" step="1" />
        <div class="scale-labels">
          <span>1 — 🌸 Fresh</span>
          <span>💀 Deadly — 10</span>
        </div>
      </div>

      <!-- Comment -->
      <div class="card">
        <div class="card-label">💬 What does it smell like? (optional)</div>
        <textarea id="comment" rows="3" maxlength="100" placeholder="e.g. Fish market, garbage, wet dog…"></textarea>
        <div class="char-count" id="char-count">0 / 100</div>
      </div>

      <!-- Submit -->
      <button id="submit-btn" disabled>
        <span id="submit-icon">💨</span>
        <span id="submit-label">Submit Stink Rating</span>
      </button>

      <!-- My ratings -->
      <div class="card">
        <div class="card-label">🗑️ My ratings — tap to delete</div>
        <div id="my-ratings-list"><p class="empty-msg">You haven't rated anything yet.</p></div>
      </div>

    </div>
  </div>

  <!-- TAB BAR -->
  <nav id="tabbar">
    <button class="tab active" id="tab-map" data-view="map-view">
      <span class="tab-icon">🗺️</span>
      <span>Stink Map</span>
    </button>
    <button class="tab" id="tab-rate" data-view="rate-view">
      <span class="tab-icon">💨</span>
      <span>Rate Spot</span>
    </button>
  </nav>
</div>

<div id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<script type="module">
import { initializeApp }      from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js';
import { getAuth,
         signInAnonymously,
         onAuthStateChanged }  from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js';
import { getFirestore,
         collection, addDoc,
         deleteDoc, doc,
         onSnapshot, query,
         orderBy, limit }      from 'https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js';

// ── Firebase ──────────────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyC_40kkX7noNP4sCiphkla-n2yoaykTDfE",
  authDomain:        "stinkmap.firebaseapp.com",
  projectId:         "stinkmap",
  storageBucket:     "stinkmap.firebasestorage.app",
  messagingSenderId: "216908791201",
  appId:             "1:216908791201:web:23fb8d8e70a584e4c79fe0"
};

const app         = initializeApp(firebaseConfig);
const auth        = getAuth(app);
const db          = getFirestore(app);
const ratingsCol  = collection(db, 'ratings');

// ── State ─────────────────────────────────────────────────────
let currentUser = null;
let userPos     = null;
let sliderVal   = 3;
let allRatings  = [];

// ── Scale (1–10) ──────────────────────────────────────────────
const LABELS = [
  '',                    // index 0 unused
  'Perfectly fresh',     // 1
  'Barely anything',     // 2
  'A slight hint',       // 3
  'Slightly off',        // 4
  'Noticeable',          // 5
  'Getting bad',         // 6
  'Pretty bad',          // 7
  'Really stinks!',      // 8
  'Awful',               // 9
  'Absolutely deadly',   // 10
];

const STINK_COLORS = [
  '', '#00ff88', '#44ff66', '#88ee44', '#ccee22', '#eeff00',
  '#ffcc00', '#ff8800', '#ff4400', '#ff1100', '#cc0000'
];

// ── Helpers ───────────────────────────────────────────────────
const $ = id => document.getElementById(id);

function showToast(msg, ms = 2800) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function formatDate(ts) {
  return new Date(ts).toLocaleString('default', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371, r = Math.PI / 180;
  const dLat = (lat2 - lat1) * r, dLon = (lon2 - lon1) * r;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*r) * Math.cos(lat2*r) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── GPS ───────────────────────────────────────────────────────
function getUserPosition() {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: Math.round(pos.coords.accuracy) }),
      ()  => resolve(null),
      { enableHighAccuracy: true, timeout: 12000 }
    );
  });
}

// ── Map ───────────────────────────────────────────────────────
let map, heatLayer;

function initMap() {
  map = L.map('leaflet-map', { center: [20, 0], zoom: 2, zoomControl: false });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 20
  }).addTo(map);

  heatLayer = L.heatLayer([], {
    radius: 40, blur: 30, maxZoom: 17, max: 10,
    gradient: {
      0.1: '#00ff88', 0.3: '#b5f542', 0.5: '#ffcc00',
      0.7: '#ff7a40', 0.9: '#ff1100', 1.0: '#cc0000'
    }
  }).addTo(map);
}

// Build heatmap points: cluster ratings within ~30m,
// use average stink as intensity.
// Multiple nearby ratings → intensity stays as average,
// but radius overlap from multiple points makes the blob larger.
function buildHeatPoints(ratings) {
  if (!ratings.length) return [];
  const CLUSTER_KM = 0.03; // ~30 metres
  const used = new Set();
  const points = [];

  for (let i = 0; i < ratings.length; i++) {
    if (used.has(i)) continue;
    const group = [ratings[i]];
    used.add(i);
    for (let j = i + 1; j < ratings.length; j++) {
      if (used.has(j)) continue;
      if (haversine(ratings[i].lat, ratings[i].lon, ratings[j].lat, ratings[j].lon) < CLUSTER_KM) {
        group.push(ratings[j]);
        used.add(j);
      }
    }
    const lat = group.reduce((s, r) => s + r.lat, 0) / group.length;
    const lon = group.reduce((s, r) => s + r.lon, 0) / group.length;
    const avg = group.reduce((s, r) => s + r.stink, 0) / group.length;
    const count = group.length;
    // Add one point per rating in the cluster at the averaged position,
    // so more ratings → bigger blob naturally in leaflet-heat
    for (let k = 0; k < count; k++) {
      points.push([lat, lon, avg]); // all same weight = avg
    }
  }
  return points;
}

function renderMap(ratings) {
  $('rating-num').textContent = ratings.length;
  heatLayer.setLatLngs(buildHeatPoints(ratings));
}

// ── Rate View ─────────────────────────────────────────────────
function updateSlider(val) {
  sliderVal = val;
  $('stink-value').textContent = val;
  $('stink-value').style.color = STINK_COLORS[val];
  $('stink-label').textContent = LABELS[val];
  $('stink-label').style.color = STINK_COLORS[val];
}

function renderMyRatings(ratings) {
  const mine = currentUser
    ? ratings.filter(r => r.uid === currentUser.uid).slice(0, 15)
    : [];
  const list = $('my-ratings-list');
  if (!mine.length) {
    list.innerHTML = '<p class="empty-msg">You haven\'t rated anything yet.</p>';
    return;
  }
  list.innerHTML = mine.map(r => `
    <div class="rating-item">
      <div class="ri-score" style="color:${STINK_COLORS[r.stink]}">${r.stink}</div>
      <div class="ri-info">
        <div class="ri-title">${LABELS[r.stink]}</div>
        <div class="ri-meta">📍 ${r.lat.toFixed(4)}, ${r.lon.toFixed(4)} · ${formatDate(r.ts)}</div>
        ${r.comment ? `<div class="ri-comment">"${r.comment}"</div>` : ''}
      </div>
      <button class="ri-delete" data-id="${r.id}">Delete</button>
    </div>`).join('');

  list.querySelectorAll('.ri-delete').forEach(btn => {
    btn.addEventListener('click', () => deleteRating(btn.dataset.id));
  });
}

async function deleteRating(id) {
  try {
    await deleteDoc(doc(db, 'ratings', id));
    showToast('🗑️ Rating deleted');
  } catch (err) {
    console.error(err);
    showToast('⚠️ Could not delete — try again');
  }
}

function checkSubmitReady() {
  $('submit-btn').disabled = !(userPos && currentUser);
}

async function startRateView() {
  const dot = $('loc-dot');
  dot.className = 'loc-dot waiting';
  $('loc-text').textContent = 'Getting your location…';
  $('loc-text').className = '';
  userPos = null;
  checkSubmitReady();

  const pos = await getUserPosition();
  if (pos) {
    userPos = pos;
    dot.className = 'loc-dot';
    $('loc-text').textContent = `${pos.lat.toFixed(5)}, ${pos.lon.toFixed(5)}  (±${pos.acc} m)`;
    $('loc-text').className = 'ready';
  } else {
    dot.className = 'loc-dot error';
    $('loc-text').textContent = 'Could not get GPS location. Please allow location access.';
    showToast('⚠️ Location access denied');
  }
  checkSubmitReady();
  renderMyRatings(allRatings);
}

async function submitRating() {
  if (!userPos || !currentUser) return;

  const btn = $('submit-btn'), label = $('submit-label'), icon = $('submit-icon');
  btn.disabled = true;
  icon.innerHTML = '<div class="spinner"></div>';
  label.textContent = 'Saving…';

  try {
    await addDoc(ratingsCol, {
      lat:     userPos.lat,
      lon:     userPos.lon,
      stink:   sliderVal,
      comment: $('comment').value.trim(),
      ts:      Date.now(),
      uid:     currentUser.uid
    });

    $('comment').value = '';
    $('char-count').textContent = '0 / 100';
    $('char-count').className = 'char-count';
    updateSlider(3);
    $('stink-slider').value = 3;

    showToast(`${sliderVal}/10 — Rating submitted! Everyone can see it 🌍`);
    switchTab('map-view');
    setTimeout(() => map.setView([userPos.lat, userPos.lon], 15, { animate: true }), 150);

  } catch (err) {
    console.error(err);
    showToast('⚠️ Could not save — check your connection.');
  } finally {
    icon.textContent = '💨';
    label.textContent = 'Submit Stink Rating';
    checkSubmitReady();
  }
}

// ── Firestore listener ────────────────────────────────────────
function subscribeToRatings() {
  const q = query(ratingsCol, orderBy('ts', 'desc'), limit(2000));
  onSnapshot(q, snapshot => {
    allRatings = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderMap(allRatings);
    if ($('rate-view').classList.contains('active')) {
      renderMyRatings(allRatings);
    }
  }, err => {
    console.error(err);
    showToast('⚠️ Could not load ratings — check connection.', 4000);
  });
}

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  document.querySelector(`.tab[data-view="${viewId}"]`).classList.add('active');
  if (viewId === 'rate-view') startRateView();
  if (viewId === 'map-view')  setTimeout(() => map && map.invalidateSize(), 80);
}

// ── Events ────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => switchTab(t.dataset.view)));
$('fab').addEventListener('click', () => switchTab('rate-view'));
$('stink-slider').addEventListener('input', e => updateSlider(+e.target.value));
$('comment').addEventListener('input', e => {
  const n = e.target.value.length;
  $('char-count').textContent = `${n} / 100`;
  $('char-count').className = 'char-count' + (n > 80 ? ' warn' : '');
});
$('submit-btn').addEventListener('click', submitRating);

// ── Init ──────────────────────────────────────────────────────
updateSlider(3);
initMap();
subscribeToRatings();

// Anonymous auth — gives each user a persistent uid for ownership
onAuthStateChanged(auth, user => {
  currentUser = user;
  checkSubmitReady();
});
signInAnonymously(auth).catch(console.error);

// Fly to user location
getUserPosition().then(pos => {
  if (pos && map) map.setView([pos.lat, pos.lon], 12, { animate: true });
});

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.warn);
}
</script>
</body>
</html>
