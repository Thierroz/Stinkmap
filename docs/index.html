<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Stinkmap" />
  <meta name="description" content="Rate how stinky a place is and see the world's stink heatmap." />
  <title>Stinkmap</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-512.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    /* ── Reset & tokens ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d1a;
      --surface:    #13132a;
      --surface2:   #1c1c3a;
      --border:     rgba(181,245,66,.15);
      --accent:     #b5f542;
      --accent-dim: rgba(181,245,66,.18);
      --text:       #e8ffe0;
      --text-muted: #7a8a6a;
      --danger:     #ff4d4d;
      --radius:     18px;
      --safe-top:   env(safe-area-inset-top, 0px);
      --safe-bot:   env(safe-area-inset-bottom, 0px);
      --tab-h:      68px;
    }

    html, body {
      height: 100%; height: 100dvh;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* animated radial backdrop */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% -5%,  rgba(181,245,66,.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 105%, rgba(80,200,60,.08) 0%, transparent 60%),
        var(--bg);
      pointer-events: none;
    }

    /* ── Shell layout ───────────────────────────────────────────── */
    #app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      height: 100dvh;
    }

    /* ── Views ──────────────────────────────────────────────────── */
    .view {
      flex: 1;
      overflow: hidden;
      display: none;
      flex-direction: column;
    }
    .view.active { display: flex; }

    /* ── Bottom Tab Bar ─────────────────────────────────────────── */
    #tabbar {
      height: var(--tab-h);
      padding-bottom: var(--safe-bot);
      background: rgba(13,13,26,.95);
      backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      flex-shrink: 0;
      z-index: 100;
    }
    .tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 4px;
      cursor: pointer; border: none; background: none;
      color: var(--text-muted); font-family: inherit;
      font-size: .72rem; font-weight: 500;
      letter-spacing: .04em;
      transition: color .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab .tab-icon { font-size: 1.55rem; transition: transform .2s; }
    .tab.active { color: var(--accent); }
    .tab.active .tab-icon { transform: scale(1.15); }

    /* ── Map view ───────────────────────────────────────────────── */
    #map-view { position: relative; }

    #map-header {
      padding: calc(var(--safe-top) + 14px) 20px 12px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(13,13,26,.88);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .map-title {
      display: flex; align-items: center; gap: 10px;
    }
    .logo-img {
      width: 36px; height: 36px;
      filter: drop-shadow(0 0 10px rgba(181,245,66,.6));
      animation: float 3.5s ease-in-out infinite;
    }
    @keyframes float {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-5px); }
    }
    h1 {
      font-size: 1.3rem; font-weight: 700;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .rating-count {
      font-size: .75rem; color: var(--text-muted);
      background: var(--accent-dim);
      border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px;
    }
    .rating-count span { color: var(--accent); font-weight: 600; }

    #leaflet-map {
      flex: 1;
      z-index: 1;
    }

    /* Leaflet popup customisation */
    .leaflet-popup-content-wrapper {
      background: var(--surface2) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      border-radius: 14px !important;
      font-family: 'Inter', sans-serif !important;
    }
    .leaflet-popup-tip { background: var(--surface2) !important; }
    .popup-stink { font-size: 1.4rem; }
    .popup-meta { font-size: .78rem; color: var(--text-muted); margin-top: 4px; }
    .popup-comment { font-size: .85rem; margin-top: 6px; font-style: italic; }

    /* FAB */
    #fab {
      position: absolute; bottom: 24px; right: 20px;
      width: 60px; height: 60px; border-radius: 50%;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      border: none; font-size: 1.6rem;
      box-shadow: 0 4px 20px rgba(181,245,66,.45);
      cursor: pointer; z-index: 500;
      transition: transform .15s, box-shadow .2s;
      -webkit-tap-highlight-color: transparent;
      display: flex; align-items: center; justify-content: center;
    }
    #fab:active { transform: scale(.92); box-shadow: 0 2px 10px rgba(181,245,66,.25); }

    /* ── Rate view ──────────────────────────────────────────────── */
    #rate-view {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .rate-inner {
      max-width: 480px; margin: 0 auto;
      padding: calc(var(--safe-top) + 24px) 20px calc(var(--safe-bot) + 100px);
      display: flex; flex-direction: column; gap: 16px;
    }

    .rate-header { text-align: center; margin-bottom: 8px; }
    .rate-header .big-emoji {
      font-size: 3.5rem;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    h2 {
      font-size: 1.5rem; font-weight: 700; margin-top: 10px;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .rate-sub { font-size: .82rem; color: var(--text-muted); margin-top: 4px; }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      backdrop-filter: blur(8px);
    }
    .card-label {
      font-size: .72rem; font-weight: 600; letter-spacing: .08em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Location row */
    .loc-row {
      display: flex; align-items: center; gap: 12px;
    }
    .loc-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent);
      flex-shrink: 0;
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 6px var(--accent); }
      50%      { box-shadow: 0 0 18px rgba(181,245,66,.8); }
    }
    .loc-dot.waiting { background: var(--text-muted); box-shadow: none; animation: none; }
    .loc-dot.error   { background: var(--danger); box-shadow: 0 0 10px var(--danger); animation: none; }
    #loc-text { font-size: .88rem; color: var(--text-muted); }
    #loc-text.ready { color: var(--text); }

    /* Stink scale slider */
    .scale-display {
      text-align: center; margin-bottom: 16px;
    }
    #stink-emoji { font-size: 3.5rem; display: block; line-height: 1; }
    #stink-label {
      font-size: 1rem; font-weight: 600; margin-top: 8px;
      color: var(--accent);
    }
    #stink-slider {
      width: 100%; margin: 0; cursor: pointer;
      -webkit-appearance: none; appearance: none;
      height: 6px; border-radius: 3px;
      background: linear-gradient(to right, #5dff8a, #b5f542, #f0c040, #ff7a40, #ff3030);
      outline: none;
    }
    #stink-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 28px; height: 28px; border-radius: 50%;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.5), 0 0 0 3px var(--accent);
      cursor: pointer;
      transition: transform .1s;
    }
    #stink-slider:active::-webkit-slider-thumb { transform: scale(1.2); }
    .scale-labels {
      display: flex; justify-content: space-between;
      margin-top: 8px; font-size: .7rem; color: var(--text-muted);
    }

    /* Comment */
    #comment {
      width: 100%; padding: 13px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: .95rem; font-family: inherit;
      outline: none; resize: none;
      transition: border-color .2s;
      -webkit-appearance: none;
    }
    #comment::placeholder { color: var(--text-muted); }
    #comment:focus { border-color: var(--accent); }
    .char-count {
      text-align: right; font-size: .7rem;
      color: var(--text-muted); margin-top: 6px;
    }
    .char-count.warn { color: #f0c040; }

    /* Submit button */
    #submit-btn {
      width: 100%; padding: 18px;
      background: linear-gradient(135deg, #b5f542, #5dff8a);
      border: none; border-radius: var(--radius);
      color: #0d0d1a; font-size: 1.1rem; font-weight: 700;
      letter-spacing: .02em; cursor: pointer;
      box-shadow: 0 4px 22px rgba(181,245,66,.35);
      transition: opacity .2s, transform .15s, box-shadow .2s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    #submit-btn:disabled {
      opacity: .4; cursor: not-allowed; box-shadow: none;
    }
    #submit-btn:not(:disabled):active {
      transform: scale(.97); box-shadow: 0 2px 10px rgba(181,245,66,.2);
    }

    /* Spinner */
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(13,13,26,.4);
      border-top-color: #0d0d1a;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Recent ratings */
    .empty-msg {
      text-align: center; color: var(--text-muted);
      padding: 20px 0; font-size: .9rem;
    }
    .rating-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .rating-item:last-child { border-bottom: none; }
    .ri-emoji { font-size: 1.8rem; flex-shrink: 0; line-height: 1.2; }
    .ri-info { flex: 1; }
    .ri-title { font-size: .88rem; font-weight: 600; }
    .ri-meta  { font-size: .72rem; color: var(--text-muted); margin-top: 2px; }
    .ri-comment { font-size: .8rem; color: var(--text-muted); margin-top: 4px; font-style: italic; }

    /* Toast */
    #toast {
      position: fixed; bottom: calc(var(--safe-bot) + var(--tab-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 40px; padding: 12px 24px;
      font-size: .88rem; font-weight: 500;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      opacity: 0; pointer-events: none; white-space: nowrap;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);
      z-index: 9999;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0); opacity: 1;
    }
  </style>
</head>
<body>
<div id="app">

  <!-- ══════════════════ MAP VIEW ══════════════════ -->
  <div class="view active" id="map-view">
    <div id="map-header">
      <div class="map-title">
        <img class="logo-img" src="icon-512.png" alt="Stinkmap logo" />
        <h1>Stinkmap</h1>
      </div>
      <div class="rating-count" id="rating-count"><span id="rating-num">0</span> ratings</div>
    </div>
    <div id="leaflet-map"></div>
    <button id="fab" title="Rate this spot">💨</button>
  </div>

  <!-- ══════════════════ RATE VIEW ══════════════════ -->
  <div class="view" id="rate-view">
    <div class="rate-inner">

      <div class="rate-header">
        <span class="big-emoji">💨</span>
        <h2>Rate this spot</h2>
        <p class="rate-sub">How bad does it smell right here?</p>
      </div>

      <!-- Location -->
      <div class="card">
        <div class="card-label">📍 Your location</div>
        <div class="loc-row">
          <div class="loc-dot waiting" id="loc-dot"></div>
          <span id="loc-text">Waiting for GPS…</span>
        </div>
      </div>

      <!-- Stink scale -->
      <div class="card">
        <div class="card-label">👃 Stink intensity</div>
        <div class="scale-display">
          <span id="stink-emoji">😐</span>
          <div id="stink-label">Barely noticeable</div>
        </div>
        <input type="range" id="stink-slider" min="1" max="5" value="2" step="1" />
        <div class="scale-labels">
          <span>🌸 Fresh</span>
          <span>💀 Deadly</span>
        </div>
      </div>

      <!-- Comment -->
      <div class="card">
        <div class="card-label">💬 What does it smell like? (optional)</div>
        <textarea id="comment" rows="3" maxlength="100" placeholder="e.g. Fish market, garbage, wet dog…"></textarea>
        <div class="char-count" id="char-count">0 / 100</div>
      </div>

      <!-- Submit -->
      <button id="submit-btn" disabled>
        <span id="submit-icon">💨</span>
        <span id="submit-label">Submit Stink Rating</span>
      </button>

      <!-- Recent ratings -->
      <div class="card">
        <div class="card-label">🕒 My recent ratings</div>
        <div id="recent-list"><p class="empty-msg">No ratings yet. Be the first!</p></div>
      </div>

    </div>
  </div>

  <!-- ══════════════════ TAB BAR ══════════════════ -->
  <nav id="tabbar">
    <button class="tab active" id="tab-map" data-view="map-view">
      <span class="tab-icon">🗺️</span>
      <span>Stink Map</span>
    </button>
    <button class="tab" id="tab-rate" data-view="rate-view">
      <span class="tab-icon">💨</span>
      <span>Rate Spot</span>
    </button>
  </nav>
</div>

<div id="toast"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<!-- Leaflet.heat -->
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

<script>
// ──────────────────────────────────────────────────────────────
// Constants & helpers
// ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'stinkmap_ratings';

const SCALES = [
  { emoji: '🌸', label: 'Fresh air',          color: '#5dff8a' },
  { emoji: '😐', label: 'Barely noticeable',  color: '#b5f542' },
  { emoji: '🤢', label: 'Pretty bad',         color: '#f0c040' },
  { emoji: '🤮', label: 'Really stinks!',     color: '#ff7a40' },
  { emoji: '💀', label: 'Absolutely deadly',  color: '#ff3030' },
];

const $ = id => document.getElementById(id);

function showToast(msg, ms = 2800) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

function formatDate(ts) {
  return new Date(ts).toLocaleString('default', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

// ──────────────────────────────────────────────────────────────
// Storage
// ──────────────────────────────────────────────────────────────
function loadRatings() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}

function saveRating(entry) {
  const ratings = loadRatings();
  ratings.unshift(entry); // newest first
  localStorage.setItem(STORAGE_KEY, JSON.stringify(ratings));
}

// ──────────────────────────────────────────────────────────────
// GPS
// ──────────────────────────────────────────────────────────────
let userPos = null;

function getUserPosition() {
  return new Promise(resolve => {
    if (!navigator.geolocation) return resolve(null);
    navigator.geolocation.getCurrentPosition(
      pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: Math.round(pos.coords.accuracy) }),
      ()  => resolve(null),
      { enableHighAccuracy: true, timeout: 12000 }
    );
  });
}

// ──────────────────────────────────────────────────────────────
// Map
// ──────────────────────────────────────────────────────────────
let map = null;
let heatLayer = null;
let markersLayer = null;

function initMap() {
  map = L.map('leaflet-map', {
    center: [20, 0], zoom: 2,
    zoomControl: false,
    attributionControl: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors © <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd', maxZoom: 20
  }).addTo(map);

  heatLayer = L.heatLayer([], {
    radius: 35,
    blur: 25,
    maxZoom: 17,
    max: 5,
    gradient: {
      0.2: '#5dff8a',
      0.4: '#b5f542',
      0.6: '#f0c040',
      0.8: '#ff7a40',
      1.0: '#ff3030'
    }
  }).addTo(map);

  markersLayer = L.layerGroup().addTo(map);
  renderMap();
}

function renderMap() {
  const ratings = loadRatings();
  $('rating-num').textContent = ratings.length;

  // Update heatmap
  const points = ratings.map(r => [r.lat, r.lon, r.stink]);
  heatLayer.setLatLngs(points);

  // Clear & re-add click markers
  markersLayer.clearLayers();
  for (const r of ratings) {
    const sc = SCALES[r.stink - 1];
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        font-size:1.6rem; line-height:1;
        filter: drop-shadow(0 2px 6px rgba(0,0,0,.6));
        cursor: pointer;
      ">${sc.emoji}</div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 32],
      popupAnchor: [0, -34]
    });
    const marker = L.marker([r.lat, r.lon], { icon });
    marker.bindPopup(`
      <div class="popup-stink">${sc.emoji} ${sc.label}</div>
      <div class="popup-meta">📍 ${r.lat.toFixed(4)}, ${r.lon.toFixed(4)}</div>
      <div class="popup-meta">🕒 ${formatDate(r.ts)}</div>
      ${r.comment ? `<div class="popup-comment">"${r.comment}"</div>` : ''}
    `);
    markersLayer.addLayer(marker);
  }
}

// ──────────────────────────────────────────────────────────────
// Rate View
// ──────────────────────────────────────────────────────────────
let sliderVal = 2;

function updateSlider(val) {
  sliderVal = val;
  const sc = SCALES[val - 1];
  $('stink-emoji').textContent = sc.emoji;
  $('stink-label').textContent = sc.label;
  $('stink-label').style.color = sc.color;
}

function renderRecent() {
  const ratings = loadRatings();
  const list = $('recent-list');
  if (!ratings.length) {
    list.innerHTML = '<p class="empty-msg">No ratings yet. Be the first!</p>';
    return;
  }
  list.innerHTML = ratings.slice(0, 8).map(r => {
    const sc = SCALES[r.stink - 1];
    return `
      <div class="rating-item">
        <div class="ri-emoji">${sc.emoji}</div>
        <div class="ri-info">
          <div class="ri-title">${sc.label}</div>
          <div class="ri-meta">📍 ${r.lat.toFixed(4)}, ${r.lon.toFixed(4)} · ${formatDate(r.ts)}</div>
          ${r.comment ? `<div class="ri-comment">"${r.comment}"</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

async function startRateView() {
  // Reset GPS indicator
  const dot = $('loc-dot');
  dot.className = 'loc-dot waiting';
  $('loc-text').textContent = 'Getting your location…';
  $('loc-text').className = '';
  $('submit-btn').disabled = true;
  userPos = null;

  // Request GPS
  const pos = await getUserPosition();
  if (pos) {
    userPos = pos;
    dot.className = 'loc-dot';
    $('loc-text').textContent = `${pos.lat.toFixed(5)}, ${pos.lon.toFixed(5)}  (±${pos.acc} m)`;
    $('loc-text').className = 'ready';
    $('submit-btn').disabled = false;
  } else {
    dot.className = 'loc-dot error';
    $('loc-text').textContent = 'Could not get GPS location. Please allow location access.';
    showToast('⚠️ Location access denied — cannot rate this spot');
  }
  renderRecent();
}

async function submitRating() {
  if (!userPos) return;

  const btn = $('submit-btn');
  const label = $('submit-label');
  const icon = $('submit-icon');
  btn.disabled = true;
  icon.innerHTML = '<div class="spinner"></div>';
  label.textContent = 'Submitting…';

  // Small artificial delay for feedback
  await new Promise(r => setTimeout(r, 600));

  const entry = {
    lat: userPos.lat,
    lon: userPos.lon,
    stink: sliderVal,
    comment: $('comment').value.trim(),
    ts: Date.now()
  };

  saveRating(entry);
  renderRecent();
  renderMap();

  // Reset UI
  $('comment').value = '';
  $('char-count').textContent = '0 / 100';
  $('char-count').className = 'char-count';
  updateSlider(2);
  $('stink-slider').value = 2;

  icon.textContent = '💨';
  label.textContent = 'Submit Stink Rating';
  btn.disabled = false;

  showToast(`${SCALES[entry.stink - 1].emoji}  Rating submitted!`);

  // Fly to submitted spot on map and switch to map tab
  switchTab('map-view');
  setTimeout(() => {
    map.setView([entry.lat, entry.lon], 15, { animate: true });
  }, 150);
}

// ──────────────────────────────────────────────────────────────
// Tab navigation
// ──────────────────────────────────────────────────────────────
function switchTab(viewId) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(viewId).classList.add('active');
  document.querySelector(`.tab[data-view="${viewId}"]`).classList.add('active');

  if (viewId === 'rate-view') startRateView();
  if (viewId === 'map-view')  setTimeout(() => map && map.invalidateSize(), 80);
}

// ──────────────────────────────────────────────────────────────
// Events
// ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.view));
});

$('fab').addEventListener('click', () => switchTab('rate-view'));

$('stink-slider').addEventListener('input', e => updateSlider(+e.target.value));

$('comment').addEventListener('input', e => {
  const n = e.target.value.length;
  $('char-count').textContent = `${n} / 100`;
  $('char-count').className = 'char-count' + (n > 80 ? ' warn' : '');
});

$('submit-btn').addEventListener('click', submitRating);

// ──────────────────────────────────────────────────────────────
// Init
// ──────────────────────────────────────────────────────────────
updateSlider(2);
initMap();

// Try to fly to user's location on first load
getUserPosition().then(pos => {
  if (pos && map) {
    map.setView([pos.lat, pos.lon], 12, { animate: true });
  }
});

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(console.warn);
}
</script>
</body>
</html>
